<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}{% endblock %}</title>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css'>
</head>
<body>
    <header class="container">
        <div class="d-flex flex-column flex-md-row align-items-center pb-3 mb-4 border-bottom">
            <a href="/" class="d-flex align-items-center link-body-emphasis text-decoration-none mt-2" style="margin-left: 15px;">
                <h4 class="fs-4">Квиз-Игра</h4>
            </a>

            <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto">
                <a class="me-3 py-2 fs-5 fw-medium link-body-emphasis text-decoration-none" href="{% url 'home' %}">Главная</a>
                <a class="me-3 py-2 fs-5 fw-medium link-body-emphasis text-decoration-none" href="{% url 'registration' %}">Игра</a>
                <a class="me-3 py-2 fs-5 fw-medium link-body-emphasis text-decoration-none" href="{% url 'about' %}">О проекте</a>
                <a class="me-3 py-2 fs-5 fw-medium link-body-emphasis text-decoration-none" href="{% url 'contacts' %}">Контакты</a>
            </nav>
        </div>
    <header>


        {% block content %}{% endblock %}
</body>
</html>
