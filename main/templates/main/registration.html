{% extends 'main/base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <h2 class="mb-4">Новая игра</h2>
            <form method="post" class="card p-4 shadow-sm">
                {% csrf_token %}
                <input type="text" name="first_name" class="form-control mb-3" placeholder="Ваше Имя" required>
                <input type="text" name="last_name" class="form-control mb-3" placeholder="Ваша Фамилия" required>
                <button type="submit" class="btn btn-success btn-lg">Начать тест</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
